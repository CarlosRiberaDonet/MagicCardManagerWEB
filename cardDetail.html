<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Carta</title>
    <link rel="stylesheet" href="cardDetail.css">
</head>
<body>
    <header>
        <h1 id="cardName">Nombre de la carta</h1>
    </header>

    <main class="card-detail-container">
        <div class="card-image">
            <img id="cardImage" src="" alt="Carta">
        </div>
        <div class="card-info">
            <p><strong>Set:</strong> <span id="cardSet"></span></p>
            <p><strong>Idioma:</strong> <span id="cardLang"></span></p>
            <p><strong>Número de colección:</strong> <span id="cardCollector"></span></p>
            <p><strong>Rareza:</strong> <span id="cardRarity"></span></p>
            <p><strong>Precio bajo:</strong> <span id="cardLow"></span> €</p>
            <p><strong>Tendencia:</strong> <span id="cardTrend"></span> €</p>
            <p><strong>Cardmarket:</strong> <a id="cardMarketURL" href="#" target="_blank">Ver en Cardmarket</a></p>
        </div>
    </main>
</body>
</html>
